
<h2 class="sr-only">Desktop game UI — dialogue top, HUD bottom with health, shield, weapon loadout, and powerup slot</h2>

<div style="padding:1.5rem 0;">
  <div style="background:#06060e;border-radius:12px;border:1.5px solid #1e2040;overflow:hidden;display:flex;flex-direction:column;font-family:'Courier New',monospace;">

    <!-- DIALOGUE BOX -->
    <div style="background:#08091a;border-bottom:1.5px solid #1a1e3a;padding:14px 20px;">
      <div style="display:flex;gap:14px;align-items:flex-start;">
        <div style="width:64px;height:64px;border:1.5px solid #335577;background:#0b1525;flex-shrink:0;border-radius:4px;display:flex;align-items:center;justify-content:center;">
          <svg width="36" height="36" viewBox="0 0 32 32">
            <polygon points="16,2 26,28 16,22 6,28" fill="#1a4477" stroke="#44aaff" stroke-width="1.2"/>
            <circle cx="16" cy="16" r="3" fill="#44aaff"/>
          </svg>
        </div>
        <div style="flex:1;">
          <div style="color:#44aaee;font-size:11px;font-weight:bold;letter-spacing:3px;margin-bottom:6px;">COMMANDER ZRIX</div>
          <div style="color:#99aabb;font-size:12px;line-height:1.7;min-height:44px;" id="dialogue-text"></div>
        </div>
        <div style="width:120px;flex-shrink:0;text-align:right;padding-top:2px;">
          <div style="color:#223355;font-size:10px;letter-spacing:1px;margin-bottom:4px;">SECTOR 7</div>
          <div style="color:#cc3333;font-size:10px;letter-spacing:2px;">■ HOSTILE</div>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:8px;">
        <div style="color:#334455;font-size:10px;letter-spacing:3px;" id="cursor-blink">CONTINUE ▼</div>
      </div>
    </div>

    <!-- GAME VIEWPORT -->
    <div style="height:240px;background:#100808;position:relative;overflow:hidden;" id="game-area">
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">
        <div style="color:#221010;font-size:9px;letter-spacing:4px;">GAME VIEWPORT</div>
      </div>
    </div>

    <!-- HUD BOTTOM -->
    <div style="background:#040410;border-top:1.5px solid #1a1e3a;padding:12px 20px 14px;display:flex;gap:20px;align-items:center;">

      <!-- STAT BARS -->
      <div style="flex:1;display:flex;flex-direction:column;gap:7px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="color:#cc3333;font-size:14px;width:16px;text-align:center;flex-shrink:0;">+</div>
          <div style="flex:1;height:11px;background:#1a0505;border:1px solid #3a0a0a;border-radius:2px;overflow:hidden;">
            <div style="width:85%;height:100%;background:#bb2020;border-radius:1px;"></div>
          </div>
          <div style="color:#cc4444;font-size:10px;flex-shrink:0;min-width:52px;text-align:right;">138<span style="color:#551a1a;">/</span>138</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="color:#3366cc;font-size:12px;width:16px;text-align:center;flex-shrink:0;">◈</div>
          <div style="flex:1;height:11px;background:#050518;border:1px solid #0a0a3a;border-radius:2px;overflow:hidden;">
            <div style="width:100%;height:100%;background:#2255bb;border-radius:1px;"></div>
          </div>
          <div style="color:#4477dd;font-size:10px;flex-shrink:0;min-width:52px;text-align:right;">30<span style="color:#1a2255;">/</span>30</div>
        </div>
      </div>

      <div style="width:1px;height:36px;background:#1e2040;flex-shrink:0;"></div>

      <!-- WEAPON LOADOUT -->
      <div style="display:flex;gap:8px;align-items:center;">
        <div style="color:#445566;font-size:9px;letter-spacing:2px;writing-mode:vertical-rl;transform:rotate(180deg);margin-right:2px;">LOADOUT</div>

        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
          <div style="width:52px;height:44px;border:1.5px solid #446688;background:#0a1520;border-radius:4px;display:flex;align-items:center;justify-content:center;">
            <svg width="30" height="22" viewBox="0 0 30 22">
              <rect x="2" y="9" width="20" height="4" fill="#2266aa" rx="1"/>
              <polygon points="22,11 30,7 30,15" fill="#44aaff"/>
              <rect x="6" y="7" width="3" height="8" fill="#335577" rx="1"/>
            </svg>
          </div>
          <div style="color:#44aaee;font-size:8px;letter-spacing:1px;">PULSE [1]</div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0.55;">
          <div style="width:52px;height:44px;border:1px solid #2a3040;background:#080c14;border-radius:4px;display:flex;align-items:center;justify-content:center;">
            <svg width="30" height="22" viewBox="0 0 30 22">
              <rect x="2" y="8" width="18" height="6" fill="#1a2233" rx="1"/>
              <polygon points="20,11 30,5 30,17" fill="#335566"/>
              <rect x="4" y="6" width="4" height="10" fill="#223344" rx="1"/>
              <rect x="10" y="6" width="4" height="10" fill="#223344" rx="1"/>
            </svg>
          </div>
          <div style="color:#445566;font-size:8px;letter-spacing:1px;">SPREAD [2]</div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0.55;">
          <div style="width:52px;height:44px;border:1px solid #2a3040;background:#080c14;border-radius:4px;display:flex;align-items:center;justify-content:center;">
            <svg width="30" height="22" viewBox="0 0 30 22">
              <rect x="2" y="10" width="22" height="2" fill="#1a2233" rx="1"/>
              <circle cx="26" cy="11" r="4" fill="#1a2a1a" stroke="#336633" stroke-width="1"/>
            </svg>
          </div>
          <div style="color:#445566;font-size:8px;letter-spacing:1px;">LASER [3]</div>
        </div>
      </div>

      <div style="width:1px;height:36px;background:#1e2040;flex-shrink:0;"></div>

      <!-- POWERUP SLOT -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <div style="color:#886600;font-size:9px;letter-spacing:2px;margin-bottom:1px;">POWERUP</div>
        <div style="width:52px;height:44px;border:1.5px solid #664400;background:#110900;border-radius:4px;display:flex;align-items:center;justify-content:center;" id="powerup-slot">
          <!-- Rocket icon -->
          <svg width="32" height="26" viewBox="0 0 32 26">
            <ellipse cx="11" cy="13" rx="9" ry="5" fill="#553300" stroke="#cc6600" stroke-width="1"/>
            <polygon points="20,13 32,10 32,16" fill="#cc6600"/>
            <polygon points="2,13 0,8 5,13" fill="#cc5500"/>
            <polygon points="2,13 0,18 5,13" fill="#cc5500"/>
            <circle cx="14" cy="13" r="2.5" fill="#ff9900" stroke="#ffcc44" stroke-width="0.8"/>
          </svg>
        </div>
        <div style="color:#cc8800;font-size:8px;letter-spacing:1px;" id="powerup-label">ROCKET [Q]</div>
      </div>

    </div>
  </div>
</div>

<style>
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
#cursor-blink{animation:blink 1.4s ease-in-out infinite}
@keyframes scroll-star{from{transform:translateY(0)}to{transform:translateY(260px)}}
@keyframes powerup-pulse{0%,100%{border-color:#664400}50%{border-color:#aa7700}}
#powerup-slot{animation:powerup-pulse 2s ease-in-out infinite}
</style>

<script>
const area = document.getElementById('game-area');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  const sz = Math.random() < 0.75 ? 1 : 2;
  const dur = (6 + Math.random() * 10).toFixed(1);
  const delay = -(Math.random() * 14).toFixed(1);
  s.style.cssText = `position:absolute;width:${sz}px;height:${sz}px;background:#fff;opacity:${(0.15+Math.random()*0.55).toFixed(2)};left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;border-radius:50%;animation:scroll-star ${dur}s ${delay}s linear infinite;`;
  area.appendChild(s);
}
const msg = "Incoming transmission... Enemy formations detected at sector 7. Brace for heavy fire — all units to battle stations.";
const el = document.getElementById('dialogue-text');
el.textContent = '';
let idx = 0;
function type() { if (idx < msg.length) { el.textContent += msg[idx++]; setTimeout(type, 28); } }
setTimeout(type, 400);
</script>
